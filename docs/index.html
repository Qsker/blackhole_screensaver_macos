<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlackHoleSaver — macOS 黑洞屏保</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; user-select: none; -webkit-user-select: none; }
  #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
  #hud {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 2;
    display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
  }
  #hud button {
    padding: 6px 14px;
    background: rgba(20,20,31,.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,.1); border-radius: 20px;
    color: #999; font-size: .76rem; cursor: pointer; transition: .2s;
    font-family: -apple-system, "PingFang SC", sans-serif;
  }
  #hud button:hover { color: #eee; border-color: rgba(255,255,255,.3); }
  #hud button.active { color: #e8874b; border-color: #e8874b; background: rgba(232,135,75,.15); }
  #preset-name {
    position: fixed; top: 24px; right: 28px; z-index: 2;
    color: rgba(255,255,255,.2); font-size: .78rem;
    font-family: -apple-system, "PingFang SC", sans-serif;
    pointer-events: none;
  }
  #hint {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 2;
    color: rgba(255,255,255,.15); font-size: .78rem; pointer-events: none;
    font-family: -apple-system, "PingFang SC", sans-serif;
    transition: opacity .5s;
  }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="preset-name"></div>
<div id="hint">🖱 拖拽移动 · 滚轮缩放 · 按数字键切换样式</div>

<div id="hud">
  <button data-idx="0">炼狱</button>
  <button data-idx="1">卡冈图雅</button>
  <button data-idx="2">M87* 甜甜圈</button>
  <button data-idx="3">正面余烬</button>
  <button data-idx="4">类星体</button>
  <button data-idx="5">耀变体</button>
  <button data-idx="6">纯透镜</button>
  <button data-idx="7">禅意</button>
</div>

<script id="vert-shader" type="x-shader/x-vertex">
attribute vec2 a_pos;
varying vec2 v_uv;
void main() {
  v_uv = a_pos * 0.5 + 0.5;
  v_uv.y = 1.0 - v_uv.y;
  gl_Position = vec4(a_pos, 0.0, 1.0);
}
</script>

<script id="frag-shader" type="x-shader/x-fragment">
precision highp float;

varying vec2 v_uv;
uniform vec2 u_resolution;
uniform float u_time;
uniform vec2 u_center;
uniform float u_holeSize;
uniform sampler2D u_bg;

// Preset parameters
uniform float u_diskTemp, u_diskIncl, u_diskRoll, u_diskInner, u_diskOuter;
uniform float u_diskOpacity, u_dopplerMix, u_diskBeam, u_diskGain;
uniform float u_diskContrast, u_diskWind, u_diskSpeed, u_exposure, u_starGain;

#define N_STEPS 48
#define B_CRIT 2.5980762
#define PI 3.14159265

float hash21(vec2 p) {
  p = fract(p * vec2(234.34, 435.345));
  p += dot(p, p + 34.23);
  return fract(p.x * p.y);
}

float glmod(float x, float y) { return x - y * floor(x / y); }

float vnoiseWrapY(vec2 p, float perY) {
  vec2 i = floor(p), f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  float y0 = glmod(i.y, perY), y1 = glmod(i.y + 1.0, perY);
  return mix(mix(hash21(vec2(i.x, y0)), hash21(vec2(i.x + 1.0, y0)), f.x),
             mix(hash21(vec2(i.x, y1)), hash21(vec2(i.x + 1.0, y1)), f.x), f.y);
}

vec2 rot2(vec2 v, float a) {
  float c = cos(a), s = sin(a);
  return vec2(c * v.x - s * v.y, s * v.x + c * v.y);
}

vec3 blackbody(float T) {
  float t = clamp(T, 1500.0, 40000.0) / 100.0;
  float r = t <= 66.0 ? 1.0 : clamp(1.292936 * pow(t - 60.0, -0.1332047), 0.0, 1.0);
  float g = t <= 66.0 ? clamp(0.3900816 * log(t) - 0.6318414, 0.0, 1.0)
                      : clamp(1.1298909 * pow(t - 60.0, -0.0755148), 0.0, 1.0);
  float b = t >= 66.0 ? 1.0 : (t <= 19.0 ? 0.0
                      : clamp(0.5432068 * log(t - 10.0) - 1.1962540, 0.0, 1.0));
  return vec3(r, g, b);
}

vec3 stars(vec3 d, float time) {
  vec2 sph = vec2(atan(d.x, -d.z), asin(clamp(d.y, -1.0, 1.0)));
  vec2 g = sph * 40.0;
  vec2 id = floor(g);
  float h = hash21(id);
  if (h < 0.92) return vec3(0.0);
  vec2 f = fract(g) - 0.5;
  vec2 off = (vec2(hash21(id + 17.3), hash21(id + 31.7)) - 0.5) * 0.7;
  float spark = smoothstep(0.10, 0.0, length(f - off));
  float tw = 0.7 + 0.3 * sin(time * (0.5 + 2.0 * hash21(id + 5.1)) + 40.0 * h);
  vec3 tint = mix(vec3(1.0, 0.82, 0.60), vec3(0.75, 0.85, 1.0), hash21(id + 2.9));
  return tint * spark * tw * ((h - 0.92) / 0.08);
}

void main() {
  vec2 uv = v_uv;
  float t = u_time;
  float aspect = u_resolution.x / max(u_resolution.y, 1.0);

  float rin = max(u_diskInner, 1.6);
  float rout = max(u_diskOuter, rin + 0.5);
  float diskIncl = u_diskIncl, diskRoll = u_diskRoll;
  float diskOpacity = u_diskOpacity, dopplerMix = u_dopplerMix, diskBeam = u_diskBeam, diskGain = u_diskGain;
  float diskContrast = u_diskContrast, diskWind = u_diskWind, diskSpeed = u_diskSpeed;
  float diskTemp = u_diskTemp, exposure = u_exposure, starGain = u_starGain;
  float warpReach = 12.0;
  float rh = max(u_holeSize, 1e-3);

  vec2 p = (uv - u_center) * vec2(aspect, 1.0);
  float plen = length(p);
  float window = exp(-pow(plen / (warpReach * rh), 2.0));

  float W = B_CRIT / rh;
  vec2 pr = rot2(vec2(p.x, -p.y), diskRoll) * W;
  float b = length(pr);
  float bmax = rout + 3.0;
  float Z0 = max(14.0, rout + 5.0);

  if (b >= bmax && window < 0.004) {
    gl_FragColor = vec4(texture2D(u_bg, uv).rgb, 1.0);
    return;
  }

  if (b >= bmax) {
    float uu = Z0 * inversesqrt(Z0 * Z0 + b * b);
    float defl = (2.0 / (W * W)) / max(plen, 1e-4)
               * (1.29 * uu + 0.07) * max(14.0 - 2.14 * uu + 0.75, 0.0) * window;
    vec2 dir = p / max(plen, 1e-5);
    vec3 term = vec3(0.0);
    for (int i = 0; i < 3; i++) {
      float k = 1.0 + (float(i) - 1.0) * 0.035;
      vec2 suv = u_center + (p - dir * defl * k) / vec2(aspect, 1.0);
      term[i] = texture2D(u_bg, suv)[i];
    }
    if (starGain > 0.001) {
      vec3 d = normalize(vec3(-(pr / b) * (2.0 / b), -1.0));
      term += stars(d, t) * starGain * window;
    }
    gl_FragColor = vec4(term, 1.0);
    return;
  }

  vec3 x = vec3(pr, Z0);
  vec3 v = vec3(0.0, 0.0, -1.0);
  float h2 = dot(pr, pr);
  bool hasDisk = (diskGain > 0.001) || (diskOpacity > 0.001);

  float ci = cos(diskIncl), si = sin(diskIncl);
  vec3 n = vec3(0.0, si, ci);
  vec3 e2 = vec3(0.0, ci, -si);
  float sdir = diskSpeed < 0.0 ? -1.0 : 1.0;
  float spd = abs(diskSpeed);

  vec3 emitc = vec3(0.0);
  float trans = 1.0;
  bool captured = false;
  float sPrev = dot(x, n);
  vec3 xPrev = x;

  for (int i = 0; i < N_STEPS; i++) {
    float r2 = dot(x, x);
    if (r2 < 1.0) { captured = true; break; }
    if (x.z < -Z0 && v.z < 0.0) break;
    if (r2 > 4.0 * Z0 * Z0) break;
    float r = sqrt(r2);
    float dt = clamp(0.16 * r, 0.03, 1.5);
    vec3 a = -1.5 * h2 * x / (r2 * r2 * r);
    v += a * (0.5 * dt);
    x += v * dt;
    r2 = dot(x, x);
    r = sqrt(r2);
    a = -1.5 * h2 * x / (r2 * r2 * r);
    v += a * (0.5 * dt);

    float s = dot(x, n);
    if (hasDisk && s * sPrev < 0.0 && trans > 0.02) {
      float tc = sPrev / (sPrev - s);
      vec3 xc = mix(xPrev, x, tc);
      float rc = length(xc);
      if (rc > rin && rc < rout) {
        float band = smoothstep(rin, rin * 1.25, rc)
                   * (1.0 - smoothstep(rout * 0.70, rout, rc));
        float phi = atan(dot(xc, e2), xc.x);
        float turns = phi / (2.0 * PI);
        float kep = pow(rin / rc, 1.5);
        float gloc = sqrt(max(1.0 - 1.5 / rc, 0.02));
        float swirl = rc * diskWind * 0.12 - t * kep * spd * gloc * sdir;
        float streaks = vnoiseWrapY(vec2(rc * 2.8, turns * 19.0 + swirl * 3.0), 19.0) * 0.65 +
                        vnoiseWrapY(vec2(rc * 1.0, turns * 9.0 + swirl * 1.5 + 7.0), 9.0) * 0.35;
        streaks = 0.35 + diskContrast * streaks * streaks;

        vec3 gasdir = normalize(cross(n, xc)) * sdir;
        float beta = clamp(inversesqrt(max(2.0 * (rc - 1.0), 0.2)), 0.0, 0.99);
        float g = gloc / max(1.0 + beta * dot(gasdir, normalize(v)), 0.05);
        g = mix(1.0, g, dopplerMix);

        float xpr = max(1.0 - sqrt(rin / rc), 0.0);
        float tprof = pow(rin / rc, 0.75) * pow(xpr, 0.25) / 0.488;
        vec3 cbb = blackbody(diskTemp * tprof * g);
        float boost = pow(g, diskBeam);
        float density = band * streaks;
        emitc += trans * cbb * (diskGain * 2.2 * density * tprof * tprof * boost);
        trans *= 1.0 - clamp(diskOpacity * density, 0.0, 1.0);
      }
    }
    sPrev = s;
    xPrev = x;
  }
  if (!captured && dot(x, x) < 4.0) captured = true;

  vec3 bg = vec3(0.004, 0.005, 0.009);
  if (!captured) {
    vec3 d = normalize(v);
    if (starGain > 0.001) bg += stars(d, t) * starGain * window;
    if (d.z < -0.05) {
      float tpl = (-14.0 - x.z) / d.z;
      vec3 hp = x + d * tpl;
      vec2 q = rot2(hp.xy, -diskRoll) / W;
      vec2 sp = vec2(q.x, -q.y);
      float toward = smoothstep(0.05, 0.35, -d.z);
      vec2 suv = u_center + (p + (sp - p) * window) / vec2(aspect, 1.0);
      bg += texture2D(u_bg, suv).rgb * toward;
    }
  }

  vec3 col = bg * trans + (vec3(1.0) - exp(-emitc * exposure));
  gl_FragColor = vec4(col, 1.0);
}
</script>

<script>
// ── Presets (mirrors the Swift DiskLook values) ──
const PRESETS = [
  { name:'炼狱',      temp:5500, incl:1.50, roll:0.35, inner:1.8, outer:8,  opacity:0.90, doppler:0.60, beam:2.5, gain:2.2, contrast:1.6, wind:7, speed:5,  exposure:1.40, star:0    },
  { name:'卡冈图雅',  temp:4500, incl:1.52, roll:0.10, inner:2.2, outer:7,  opacity:0.85, doppler:0.35, beam:2.0, gain:1.4, contrast:0.5, wind:7, speed:5,  exposure:1.20, star:0    },
  { name:'M87* 甜甜圈',temp:3800, incl:0.55, roll:-0.30,inner:2.2, outer:6,  opacity:0.45, doppler:0.90, beam:3.5, gain:1.6, contrast:0.4, wind:3, speed:2.5,exposure:1.10, star:0    },
  { name:'正面余烬',  temp:6500, incl:0.30, roll:0.0,  inner:3.0, outer:10, opacity:0.50, doppler:0.80, beam:2.5, gain:1.0, contrast:1.1, wind:7, speed:5,  exposure:1.00, star:0    },
  { name:'类星体',    temp:15000,incl:1.30, roll:0.35, inner:3.0, outer:14, opacity:0.35, doppler:1.00, beam:4.0, gain:1.2, contrast:1.3, wind:8, speed:5,  exposure:0.80, star:0    },
  { name:'耀变体',    temp:18000,incl:1.05, roll:0.55, inner:3.0, outer:16, opacity:0.30, doppler:1.00, beam:5.0, gain:1.0, contrast:1.5, wind:9, speed:6,  exposure:0.75, star:0    },
  { name:'纯透镜',    temp:5500, incl:1.50, roll:0.35, inner:1.8, outer:8,  opacity:0.0,  doppler:1.00, beam:2.5, gain:0.0, contrast:1.6, wind:7, speed:5,  exposure:1.00, star:0.6  },
  { name:'禅意',      temp:7000, incl:1.45, roll:0.15, inner:3.5, outer:7,  opacity:0.40, doppler:0.50, beam:2.0, gain:0.5, contrast:0.3, wind:3, speed:1.5,exposure:0.70, star:0    },
];
let presetIdx = 0;

function loadBgTexture(gl, url) {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE,
    new Uint8Array([26, 58, 92, 255]));

  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.MIRRORED_REPEAT);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.MIRRORED_REPEAT);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  };
  img.src = url;

  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.MIRRORED_REPEAT);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.MIRRORED_REPEAT);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  return tex;
}

function compileShader(gl, type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error('Shader:', gl.getShaderInfoLog(s));
    gl.deleteShader(s); return null;
  }
  return s;
}

function createProgram(gl, vsSrc, fsSrc) {
  const vs = compileShader(gl, gl.VERTEX_SHADER, vsSrc);
  const fs = compileShader(gl, gl.FRAGMENT_SHADER, fsSrc);
  if (!vs || !fs) return null;
  const p = gl.createProgram();
  gl.attachShader(p, vs); gl.attachShader(p, fs);
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    console.error('Link:', gl.getProgramInfoLog(p)); return null;
  }
  return p;
}

// Lissajous drift — same as the Swift version
function lissa(t) {
  return [
    0.75 * Math.sin(t * 0.37) + 0.25 * Math.sin(t * 0.83 + 1.0),
    0.70 * Math.sin(t * 0.54 + 2.1) + 0.30 * Math.sin(t * 1.07)
  ];
}

function applyPreset(p, gl, locs) {
  gl.uniform1f(locs.temp, p.temp);
  gl.uniform1f(locs.incl, p.incl);
  gl.uniform1f(locs.roll, p.roll);
  gl.uniform1f(locs.inner, p.inner);
  gl.uniform1f(locs.outer, p.outer);
  gl.uniform1f(locs.opacity, p.opacity);
  gl.uniform1f(locs.doppler, p.doppler);
  gl.uniform1f(locs.beam, p.beam);
  gl.uniform1f(locs.gain, p.gain);
  gl.uniform1f(locs.contrast, p.contrast);
  gl.uniform1f(locs.wind, p.wind);
  gl.uniform1f(locs.speed, p.speed);
  gl.uniform1f(locs.exposure, p.exposure);
  gl.uniform1f(locs.star, p.star);
}

function main() {
  const canvas = document.getElementById('bg-canvas');
  const gl = canvas.getContext('webgl', { antialias: false });
  if (!gl) return;

  const vsSrc = document.getElementById('vert-shader').textContent;
  const fsSrc = document.getElementById('frag-shader').textContent;
  const prog = createProgram(gl, vsSrc, fsSrc);
  if (!prog) return;
  gl.useProgram(prog);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  const aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  const locs = {
    res:    gl.getUniformLocation(prog, 'u_resolution'),
    time:   gl.getUniformLocation(prog, 'u_time'),
    center: gl.getUniformLocation(prog, 'u_center'),
    hole:   gl.getUniformLocation(prog, 'u_holeSize'),
    bg:     gl.getUniformLocation(prog, 'u_bg'),
    temp:   gl.getUniformLocation(prog, 'u_diskTemp'),
    incl:   gl.getUniformLocation(prog, 'u_diskIncl'),
    roll:   gl.getUniformLocation(prog, 'u_diskRoll'),
    inner:  gl.getUniformLocation(prog, 'u_diskInner'),
    outer:  gl.getUniformLocation(prog, 'u_diskOuter'),
    opacity:gl.getUniformLocation(prog, 'u_diskOpacity'),
    doppler:gl.getUniformLocation(prog, 'u_dopplerMix'),
    beam:   gl.getUniformLocation(prog, 'u_diskBeam'),
    gain:   gl.getUniformLocation(prog, 'u_diskGain'),
    contrast:gl.getUniformLocation(prog, 'u_diskContrast'),
    wind:   gl.getUniformLocation(prog, 'u_diskWind'),
    speed:  gl.getUniformLocation(prog, 'u_diskSpeed'),
    exposure:gl.getUniformLocation(prog, 'u_exposure'),
    star:   gl.getUniformLocation(prog, 'u_starGain'),
  };

  gl.uniform1i(locs.bg, 0);
  // Desktop-style background — uses local image, loads instantly
  const bgURL = 'https://picsum.photos/1024/768';
  const bgTex = loadBgTexture(gl, bgURL);

  applyPreset(PRESETS[0], gl, locs);
  document.getElementById('preset-name').textContent = PRESETS[0].name;

  // ── UI ──
  let holeSize = 0.06, userX = 0.5, userY = 0.5;
  let dragging = false;
  const driftSpeed = 1.0;

  function setPreset(idx) {
    presetIdx = idx;
    applyPreset(PRESETS[idx], gl, locs);
    document.getElementById('preset-name').textContent = PRESETS[idx].name;
    document.querySelectorAll('#hud button').forEach((b,i) => b.classList.toggle('active', i===idx));
  }

  document.querySelectorAll('#hud button').forEach(btn => {
    btn.addEventListener('click', () => {
      setPreset(parseInt(btn.dataset.idx));
    });
  });

  document.addEventListener('keydown', (e) => {
    const n = parseInt(e.key);
    if (n >= 1 && n <= PRESETS.length) setPreset(n - 1);
    if (e.key === '0') setPreset(7);
  });

  // Simple: hole moves to where pointer is
  function pointerUv(e) { return [e.clientX / innerWidth, 1.0 - e.clientY / innerHeight]; }

  canvas.addEventListener('mousedown', (e) => {
    dragging = true;
    const [mx, my] = pointerUv(e);
    userX = mx;
    userY = my;
  });
  window.addEventListener('mouseup', () => { dragging = false; });
  canvas.addEventListener('mousemove', (e) => {
    if (dragging) {
      const [mx, my] = pointerUv(e);
      userX = mx;
      userY = my;
    }
  });
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    holeSize = Math.max(0.02, Math.min(0.15, holeSize - e.deltaY * 0.0002));
  }, { passive: false });
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault(); dragging = true;
    const [mx, my] = pointerUv(e.touches[0]);
    userX = mx;
    userY = my;
  });
  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (dragging) {
      const [mx, my] = pointerUv(e.touches[0]);
      userX = mx;
      userY = my;
    }
  });
  canvas.addEventListener('touchend', () => { dragging = false; });

  // Hide initial hint after first interaction
  const hint = document.getElementById('hint');
  let hintHidden = false;
  function hideHint() { if (!hintHidden) { hint.style.opacity = '0'; hintHidden = true; } }
  canvas.addEventListener('mousedown', hideHint);
  canvas.addEventListener('wheel', hideHint);
  document.addEventListener('keydown', hideHint);

  function resize() {
    const dpr = Math.min(devicePixelRatio || 1, 2);
    canvas.width = innerWidth * dpr;
    canvas.height = innerHeight * dpr;
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  window.addEventListener('resize', resize);
  resize();

  function render(time) {
    resize();
    const t = time * 0.001;

    // Lissajous drift + user grab offset
    const [wx, wy] = lissa(t * 0.3 * driftSpeed);
    let cx = userX + wx * 0.02;
    let cy = userY + wy * 0.02;
    cx = Math.max(-0.02, Math.min(1.02, cx));
    cy = Math.max(-0.02, Math.min(1.02, cy));

    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, bgTex);
    gl.uniform2f(locs.res, canvas.width, canvas.height);
    gl.uniform1f(locs.time, t);
    gl.uniform2f(locs.center, cx, cy);
    gl.uniform1f(locs.hole, holeSize);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }
  requestAnimationFrame(render);
}

main();
</script>
</body>
</html>
