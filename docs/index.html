<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlackHoleSaver — macOS 黑洞屏保</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<script id="vert-shader" type="x-shader/x-vertex">
attribute vec2 a_pos;
varying vec2 v_uv;
void main() {
  v_uv = a_pos * 0.5 + 0.5;
  v_uv.y = 1.0 - v_uv.y;
  gl_Position = vec4(a_pos, 0.0, 1.0);
}
</script>

<script id="frag-shader" type="x-shader/x-fragment">
precision highp float;

varying vec2 v_uv;
uniform vec2 u_resolution;
uniform float u_time;
uniform vec2 u_center;
uniform float u_holeSize;
uniform sampler2D u_bg;

#define N_STEPS 48
#define B_CRIT 2.5980762
#define PI 3.14159265

float hash21(vec2 p) {
  p = fract(p * vec2(234.34, 435.345));
  p += dot(p, p + 34.23);
  return fract(p.x * p.y);
}

float glmod(float x, float y) { return x - y * floor(x / y); }

float vnoiseWrapY(vec2 p, float perY) {
  vec2 i = floor(p), f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  float y0 = glmod(i.y, perY), y1 = glmod(i.y + 1.0, perY);
  return mix(mix(hash21(vec2(i.x, y0)), hash21(vec2(i.x + 1.0, y0)), f.x),
             mix(hash21(vec2(i.x, y1)), hash21(vec2(i.x + 1.0, y1)), f.x), f.y);
}

vec2 rot2(vec2 v, float a) {
  float c = cos(a), s = sin(a);
  return vec2(c * v.x - s * v.y, s * v.x + c * v.y);
}

vec3 blackbody(float T) {
  float t = clamp(T, 1500.0, 40000.0) / 100.0;
  float r = t <= 66.0 ? 1.0 : clamp(1.292936 * pow(t - 60.0, -0.1332047), 0.0, 1.0);
  float g = t <= 66.0 ? clamp(0.3900816 * log(t) - 0.6318414, 0.0, 1.0)
                      : clamp(1.1298909 * pow(t - 60.0, -0.0755148), 0.0, 1.0);
  float b = t >= 66.0 ? 1.0 : (t <= 19.0 ? 0.0
                      : clamp(0.5432068 * log(t - 10.0) - 1.1962540, 0.0, 1.0));
  return vec3(r, g, b);
}

vec3 stars(vec3 d, float time) {
  vec2 sph = vec2(atan(d.x, -d.z), asin(clamp(d.y, -1.0, 1.0)));
  vec2 g = sph * 40.0;
  vec2 id = floor(g);
  float h = hash21(id);
  if (h < 0.92) return vec3(0.0);
  vec2 f = fract(g) - 0.5;
  vec2 off = (vec2(hash21(id + 17.3), hash21(id + 31.7)) - 0.5) * 0.7;
  float spark = smoothstep(0.10, 0.0, length(f - off));
  float tw = 0.7 + 0.3 * sin(time * (0.5 + 2.0 * hash21(id + 5.1)) + 40.0 * h);
  vec3 tint = mix(vec3(1.0, 0.82, 0.60), vec3(0.75, 0.85, 1.0), hash21(id + 2.9));
  return tint * spark * tw * ((h - 0.92) / 0.08);
}

void main() {
  vec2 uv = v_uv;
  float t = u_time;
  float aspect = u_resolution.x / max(u_resolution.y, 1.0);

  float rin = 1.8, rout = 8.0;
  float diskIncl = 1.50, diskRoll = 0.35;
  float diskOpacity = 0.90, dopplerMix = 0.60, diskBeam = 2.5, diskGain = 2.2;
  float diskContrast = 1.6, diskWind = 7.0, diskSpeed = 5.0;
  float diskTemp = 5500.0, exposure = 1.40;
  float warpReach = 12.0;
  float rh = max(u_holeSize, 1e-3);

  vec2 p = (uv - u_center) * vec2(aspect, 1.0);
  float plen = length(p);
  float window = exp(-pow(plen / (warpReach * rh), 2.0));

  float W = B_CRIT / rh;
  vec2 pr = rot2(vec2(p.x, -p.y), diskRoll) * W;
  float b = length(pr);
  float bmax = rout + 3.0;
  float Z0 = max(14.0, rout + 5.0);

  if (b >= bmax && window < 0.004) {
    gl_FragColor = vec4(texture2D(u_bg, uv).rgb, 1.0);
    return;
  }

  if (b >= bmax) {
    float uu = Z0 * inversesqrt(Z0 * Z0 + b * b);
    float defl = (2.0 / (W * W)) / max(plen, 1e-4)
               * (1.29 * uu + 0.07) * max(14.0 - 2.14 * uu + 0.75, 0.0) * window;
    vec2 dir = p / max(plen, 1e-5);
    vec3 term = vec3(0.0);
    for (int i = 0; i < 3; i++) {
      float k = 1.0 + (float(i) - 1.0) * 0.035;
      vec2 suv = u_center + (p - dir * defl * k) / vec2(aspect, 1.0);
      term[i] = texture2D(u_bg, suv)[i];
    }
    vec3 d = normalize(vec3(-(pr / b) * (2.0 / b), -1.0));
    term += stars(d, t) * 0.6 * window;
    gl_FragColor = vec4(term, 1.0);
    return;
  }

  vec3 x = vec3(pr, Z0);
  vec3 v = vec3(0.0, 0.0, -1.0);
  float h2 = dot(pr, pr);

  float ci = cos(diskIncl), si = sin(diskIncl);
  vec3 n = vec3(0.0, si, ci);
  vec3 e2 = vec3(0.0, ci, -si);
  float spd = abs(diskSpeed);

  vec3 emitc = vec3(0.0);
  float trans = 1.0;
  bool captured = false;
  float sPrev = dot(x, n);
  vec3 xPrev = x;

  for (int i = 0; i < N_STEPS; i++) {
    float r2 = dot(x, x);
    if (r2 < 1.0) { captured = true; break; }
    if (x.z < -Z0 && v.z < 0.0) break;
    if (r2 > 4.0 * Z0 * Z0) break;
    float r = sqrt(r2);
    float dt = clamp(0.16 * r, 0.03, 1.5);
    vec3 a = -1.5 * h2 * x / (r2 * r2 * r);
    v += a * (0.5 * dt);
    x += v * dt;
    r2 = dot(x, x);
    r = sqrt(r2);
    a = -1.5 * h2 * x / (r2 * r2 * r);
    v += a * (0.5 * dt);

    float s = dot(x, n);
    if (s * sPrev < 0.0 && trans > 0.02) {
      float tc = sPrev / (sPrev - s);
      vec3 xc = mix(xPrev, x, tc);
      float rc = length(xc);
      if (rc > rin && rc < rout) {
        float band = smoothstep(rin, rin * 1.25, rc)
                   * (1.0 - smoothstep(rout * 0.70, rout, rc));
        float phi = atan(dot(xc, e2), xc.x);
        float turns = phi / (2.0 * PI);
        float kep = pow(rin / rc, 1.5);
        float gloc = sqrt(max(1.0 - 1.5 / rc, 0.02));
        float swirl = rc * diskWind * 0.12 - t * kep * spd * gloc;
        float streaks = vnoiseWrapY(vec2(rc * 2.8, turns * 19.0 + swirl * 3.0), 19.0) * 0.65 +
                        vnoiseWrapY(vec2(rc * 1.0, turns * 9.0 + swirl * 1.5 + 7.0), 9.0) * 0.35;
        streaks = 0.35 + diskContrast * streaks * streaks;

        vec3 gasdir = normalize(cross(n, xc));
        float beta = clamp(inversesqrt(max(2.0 * (rc - 1.0), 0.2)), 0.0, 0.99);
        float g = gloc / max(1.0 + beta * dot(gasdir, normalize(v)), 0.05);
        g = mix(1.0, g, dopplerMix);

        float xpr = max(1.0 - sqrt(rin / rc), 0.0);
        float tprof = pow(rin / rc, 0.75) * pow(xpr, 0.25) / 0.488;
        vec3 cbb = blackbody(diskTemp * tprof * g);
        float boost = pow(g, diskBeam);
        float density = band * streaks;
        emitc += trans * cbb * (diskGain * 2.2 * density * tprof * tprof * boost);
        trans *= 1.0 - clamp(diskOpacity * density, 0.0, 1.0);
      }
    }
    sPrev = s;
    xPrev = x;
  }
  if (!captured && dot(x, x) < 4.0) captured = true;

  vec3 bg = vec3(0.0);
  if (!captured) {
    vec3 d = normalize(v);
    bg += stars(d, t) * 0.6 * window;
    if (d.z < -0.05) {
      float tpl = (-14.0 - x.z) / d.z;
      vec3 hp = x + d * tpl;
      vec2 q = rot2(hp.xy, -diskRoll) / W;
      vec2 sp = vec2(q.x, -q.y);
      float toward = smoothstep(0.05, 0.35, -d.z);
      vec2 suv = u_center + (p + (sp - p) * window) / vec2(aspect, 1.0);
      bg += texture2D(u_bg, suv).rgb * toward;
    }
  }

  vec3 col = bg * trans + (vec3(1.0) - exp(-emitc * exposure));
  gl_FragColor = vec4(col, 1.0);
}
</script>

<script>
function loadBgTexture(gl, url) {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE,
    new Uint8Array([26, 58, 92, 255]));

  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() {
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.MIRRORED_REPEAT);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.MIRRORED_REPEAT);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  };
  img.src = url;

  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.MIRRORED_REPEAT);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.MIRRORED_REPEAT);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  return tex;
}

function compileShader(gl, type, source) {
  const s = gl.createShader(type);
  gl.shaderSource(s, source);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error('Shader error:', gl.getShaderInfoLog(s));
    gl.deleteShader(s);
    return null;
  }
  return s;
}

function createProgram(gl, vsSrc, fsSrc) {
  const vs = compileShader(gl, gl.VERTEX_SHADER, vsSrc);
  const fs = compileShader(gl, gl.FRAGMENT_SHADER, fsSrc);
  if (!vs || !fs) return null;
  const p = gl.createProgram();
  gl.attachShader(p, vs);
  gl.attachShader(p, fs);
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    console.error('Link error:', gl.getProgramInfoLog(p));
    return null;
  }
  return p;
}

function main() {
  const canvas = document.getElementById('bg-canvas');
  const gl = canvas.getContext('webgl', { antialias: false });
  if (!gl) return;

  const vsSrc = document.getElementById('vert-shader').textContent;
  const fsSrc = document.getElementById('frag-shader').textContent;
  const prog = createProgram(gl, vsSrc, fsSrc);
  if (!prog) return;
  gl.useProgram(prog);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  const aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uCenter = gl.getUniformLocation(prog, 'u_center');
  const uHoleSize = gl.getUniformLocation(prog, 'u_holeSize');
  const uBg = gl.getUniformLocation(prog, 'u_bg');

  const bgURL = 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1024&q=80';
  const bgTex = loadBgTexture(gl, bgURL);
  gl.uniform1i(uBg, 0);

  let centerX = 0.5, centerY = 0.5, holeSize = 0.06;
  let isDragging = false;

  canvas.addEventListener('mousedown', () => { isDragging = true; });
  window.addEventListener('mouseup', () => { isDragging = false; });
  canvas.addEventListener('mousemove', (e) => {
    if (isDragging) {
      centerX = e.clientX / window.innerWidth;
      centerY = 1.0 - e.clientY / window.innerHeight;
    }
  });
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    holeSize = Math.max(0.02, Math.min(0.15, holeSize - e.deltaY * 0.0002));
  }, { passive: false });

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    isDragging = true;
    centerX = e.touches[0].clientX / window.innerWidth;
    centerY = 1.0 - e.touches[0].clientY / window.innerHeight;
  });
  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (isDragging) {
      centerX = e.touches[0].clientX / window.innerWidth;
      centerY = 1.0 - e.touches[0].clientY / window.innerHeight;
    }
  });
  canvas.addEventListener('touchend', () => { isDragging = false; });

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  window.addEventListener('resize', resize);
  resize();

  function render(time) {
    resize();
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, bgTex);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uTime, time * 0.001);
    gl.uniform2f(uCenter, centerX, centerY);
    gl.uniform1f(uHoleSize, holeSize);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }
  requestAnimationFrame(render);
}

main();
</script>
</body>
</html>
